<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job {{JOB_ID}} - Buildbot Dispatcher</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <div class="header-inner">
                <h1 class="site-title">Buildbot Dispatcher</h1>
                <nav class="site-nav">
                    <a href="/dashboard">Dashboard</a>
                    <a href="/jobs" class="active">Jobs</a>
                    <a href="/runners">Runners</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="page-header">
            <h2>Job <span id="job-id-display"></span></h2>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="cancelJob()">Cancel</button>
                <button class="btn btn-primary" onclick="loadJobDetail()">Refresh</button>
            </div>
        </div>

        <section class="panel">
            <h3>Job Details</h3>
            <div id="job-loading" class="loading">Loading...</div>
            <table class="detail-table" id="job-detail-table" style="display:none">
                <tbody id="job-detail-body"></tbody>
            </table>
        </section>

        <section class="panel">
            <h3>Raw JSON Response</h3>
            <pre class="code-block" id="job-json"></pre>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>Buildbot Dispatcher &mdash; Rust CI System</p>
        </div>
    </footer>

    <script src="/static/app.js"></script>
    <script>
        var JOB_ID = '{{JOB_ID}}';
        document.getElementById('job-id-display').textContent = JOB_ID;
        document.addEventListener('DOMContentLoaded', function() {
            loadJobDetail();
        });
    </script>
</body>
</html>
