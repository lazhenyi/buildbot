<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Builders - Buildbot</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: #f5f5f5;
        }
        .header {
            background: #2c3e50;
            color: white;
            padding: 1rem 2rem;
        }
        .header h1 { margin: 0; font-size: 1.5rem; }
        .nav { display: flex; gap: 1rem; margin-top: 1rem; }
        .nav a { color: white; text-decoration: none; padding: 0.5rem 1rem; border-radius: 4px; }
        .nav a:hover { background: rgba(255,255,255,0.1); }
        .content { padding: 2rem; max-width: 1400px; margin: 0 auto; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; }
        tr:hover { background: #f8f9fa; }
        .status { padding: 0.25rem 0.75rem; border-radius: 12px; font-size: 0.75rem; font-weight: 500; }
        .status.success { background: #d4edda; color: #155724; }
        .status.failure { background: #f8d7da; color: #721c24; }
        .status.running { background: #cce5ff; color: #004085; }
        .status.idle { background: #e2e3e5; color: #383d41; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Builders</h1>
        <nav class="nav">
            <a href="/">Home</a>
            <a href="/dashboard">Dashboard</a>
            <a href="/builders">Builders</a>
            <a href="/workers">Workers</a>
        </nav>
    </div>

    <div class="content">
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Status</th>
                    <th>Last Build</th>
                    <th>Workers</th>
                </tr>
            </thead>
            <tbody id="builders-table">
                <tr><td colspan="4">Loading...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        async function loadBuilders() {
            try {
                const res = await fetch('/api/v2/builders');
                const data = await res.json();
                const tbody = document.getElementById('builders-table');
                if (data.builders && data.builders.length > 0) {
                    tbody.innerHTML = data.builders.map(b => `
                        <tr>
                            <td>${b.name || 'Builder ' + b.id}</td>
                            <td><span class="status idle">Idle</span></td>
                            <td>-</td>
                            <td>-</td>
                        </tr>
                    `).join('');
                } else {
                    tbody.innerHTML = '<tr><td colspan="4">No builders configured</td></tr>';
                }
            } catch (e) {
                document.getElementById('builders-table').innerHTML = '<tr><td colspan="4">Error loading builders</td></tr>';
            }
        }
        loadBuilders();
    </script>
</body>
</html>
