version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    commit-message:
      prefix: "deps: "
    open-pull-requests-limit: 10
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    # Group minor/patch updates together
    groups:
      cargo:
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    commit-message:
      prefix: "ci: "
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
