# Buildbot Dispatcher Configuration (YAML format)
#
# Place this file as master.cfg in your basedir

# ── Master section ──────────────────────────────────────────────
master:
  name: "buildbot-dispatcher"
  web_url: "http://localhost:8010"
  # Enable strict Python dependency validation for CI scripts
  strict_python_deps: false
  # Directory for cloned repositories
  dispatcher_workdir: "/app/repos"
  # Runner heartbeat timeout in seconds (runners not heard from for this duration are marked disconnected)
  runner_timeout_secs: 300

# ── Database section ───────────────────────────────────────────
database:
  # SQLite (default):
  url: "sqlite:///app/data/buildbot.db"
  # PostgreSQL (uncomment to use):
  # url: "postgres://buildbot:password@localhost:5432/buildbot"

# ── Web interface ──────────────────────────────────────────────
www:
  # API port
  port: 9990
  # Web UI port
  web_port: 8010
